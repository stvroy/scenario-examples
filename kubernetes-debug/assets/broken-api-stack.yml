apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: production
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway-v2   # BUG: mismatch intentionally kept
    spec:
      containers:
        - name: api-gateway
          image: nginx:1.99.0   # BUG: invalid tag
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: api-config
          readinessProbe:
            httpGet:
              path: /
              port: 9090  # BUG: wrong port
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: production
spec:
  selector:
    app: api-gateway  # BUG: does not match pod label
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP